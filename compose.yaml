services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoecole_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_ENV: dev
      APP_SECRET: autoecole-dev-secret-change-me
      DATABASE_URL: postgresql://autoecole:password@database:5432/autoecole?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
      MAILER_DSN: smtp://mailpit:1025
      AUTOECOLE_SEED: "1"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./:/var/www/html:cached
      - composer_cache:/tmp/composer

  database:
    image: postgres:16-alpine
    container_name: autoecole_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: autoecole
      POSTGRES_USER: autoecole
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoecole -d autoecole"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - autoecole_postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    container_name: autoecole_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      database:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit:latest
    container_name: autoecole_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  autoecole_postgres_data:
  composer_cache:
